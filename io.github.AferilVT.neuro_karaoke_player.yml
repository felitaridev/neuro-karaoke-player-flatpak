id: io.github.AferilVT.neuro_karaoke_player
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: neuro-karaoke-player
modules: 

  - name: neuro-karaoke-player
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra ${FLATPAK_DEST}/bin/apply_extra
      - install -Dm644 -t ${FLATPAK_DEST}/share/metainfo/ ${FLATPAK_ID}.metainfo.xml
      - install -Dm644 -t ${FLATPAK_DEST}/share/applications/ ${FLATPAK_ID}.desktop
      - install -Dm644 -t ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/ ${FLATPAK_ID}.png
      - ln -s ${FLATPAK_DEST}/extra/opt/Neuro\ Karaoke\ Player/neuro-karaoke-player ${FLATPAK_DEST}/bin/neuro-karaoke-player
    sources:
      - filename: Neuro.Karaoke.Player.deb
        url: https://github.com/AferilVT/neuro-karaoke-wrapper/releases/download/v1.4alpha/Neuro.Karaoke.Player-x86_64.deb
        sha256: 32dccfc518bbfe60d5f7232867392d40532c66fd3320bf56960cd3e45faf2913
        size: 91898836
        type: extra-data
        only-arches:
          - x86_64

      - filename: Neuro.Karaoke.Player.deb
        url: https://github.com/AferilVT/neuro-karaoke-wrapper/releases/download/v1.4alpha/Neuro.Karaoke.Player-arm64.deb
        sha56: e4b57640ff1bb865f5beeba5a785081308427cb2de4d40636d1a6e3e18930548
        size: 86831812
        type: extra-data
        only-arches:
          - aarch64

      - path: io.github.AferilVT.neuro_karaoke_player.metainfo.xml
        type: file

      - path: io.github.AferilVT.neuro_karaoke_player.desktop
        type: file

      - path: io.github.AferilVT.neuro_karaoke_player.png
        type: file

      - type: script
        dest-filename: apply_extra
        commands:
          - echo Extracting .deb
          - bsdtar --to-stdout -xf Neuro.Karaoke.Player.deb 'data.*' | bsdtar -xf -
          - rm Neuro.Karaoke.Player.deb
finish-args: 
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
